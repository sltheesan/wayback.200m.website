server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # --- Gzip compression ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # --- API Reverse Proxy → Backend container ---
    location /api/ {
        resolver 127.0.0.11 valid=5s;
        set $backend_api_upstream http://backend:8000;
        proxy_pass $backend_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 256k;
        # Remove X-Frame-Options from backend so iframes are allowed on same origin
        proxy_hide_header X-Frame-Options;
    }

    # --- Health check proxy ---
    location /health {
        resolver 127.0.0.11 valid=5s;
        set $backend_health_upstream http://backend:8000/health;
        proxy_pass $backend_health_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # --- SPA Routing: serve index.html for all non-file routes ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Static asset caching ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- Error pages ---
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
